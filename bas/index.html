<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAS常用命令</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .header {
            background: linear-gradient(90deg, #FFD700 0%, #FF4500 100%);
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            color: white;
            margin: 0;
            font-size: 48px;
            letter-spacing: 2px;
        }
        .back-link {
            display: inline-block;
            margin: 20px;
            padding: 10px 20px;
            background-color: #FF4500;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            background-color: #FFD700;
            color: #FF4500;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .command-section {
            background-color: white;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .command-section h2 {
            color: #FF4500;
            border-bottom: 2px solid #FF4500;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .command-item {
            margin: 20px 0;
            padding: 15px;
            background-color: #f9f9f9;
            border-left: 4px solid #FF4500;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }
        .command-description {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
            font-family: Arial, sans-serif;
        }
        .note {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>BAS常用命令</h1>
        <a href="../" class="back-link">← 返回主页</a>
    </div>
    
 <div class="container">
        <div class="command-section">
         <h2>BAS常用命令</h2>
             
            <div class="command-item">
                <div style="color: #333; font-weight: bold;">待添加</div>
            </div>
             
          
               <div class="note">
                <strong>💡 提示：</strong> 注：重要设备，请谨慎操作
              </div>
    </div>
</body>
</html>
