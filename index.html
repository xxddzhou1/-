<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周成的静态页面</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
            padding-top: 80px;
            font-size: 64px;
            margin: 0;
            background: linear-gradient(90deg, #FFD700 0%, #FF4500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 2px;
        }
        .divider {
            width: 80%;
            height: 4px;
            background-color: red;
            margin: 40px auto;
            box-shadow: 0 2px 0 0 red;
        }
        .sections-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .section-card {
            background-color: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            text-align: center;
        }
        .section-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transform: translateY(-5px);
        }
        .section-card a {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: #FF4500;
            text-decoration: none;
            padding: 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .section-card a:hover {
            color: white;
            background-color: #FF4500;
        }
    </style>
</head>
<body>
    <h1>欢迎来到周成的静态页面</h1>
    
    <div class="divider"></div>
    
    <div class="sections-container">
        <div class="section-card">
            <a href="./olt/">OLT常用命令</a>
        </div>
        <div class="section-card">
            <a href="./bas/">BAS常用命令</a>
        </div>
        <div class="section-card">
            <a href="./onu/">ONU常用命令</a>
        </div>
        <div class="section-card">
            <a href="./vps/">VPS专区</a>
        </div>
    </div>
</body>
</html>
